<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#243352"/>
    </linearGradient>
    <linearGradient id="sail" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="hull" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="compass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Waves (back) -->
  <path d="M0 90 Q32 80 64 90 Q128 110 128 90 L128 128 L0 128Z" fill="url(#wave2)"/>
  <path d="M0 100 Q32 90 64 100 Q128 120 128 100 L128 128 L0 128Z" fill="url(#wave1)"/>

  <!-- Hull -->
  <path d="M28 85 L100 85 L90 105 L38 105Z" fill="url(#hull)"/>

  <!-- Mast -->
  <line x1="64" y1="20" x2="64" y2="85" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>

  <!-- Sail (compass rose pattern) -->
  <path d="M64 25 L85 70 L64 60 L43 70 Z" fill="url(#sail)" opacity="0.9"/>

  <!-- Compass needle (gold diamond) -->
  <polygon points="64,30 72,45 64,55 56,45" fill="url(#compass)"/>

  <!-- Compass center dot -->
  <circle cx="64" cy="45" r="3" fill="#1a2744"/>

  <!-- Wave highlights -->
  <path d="M10 95 Q25 90 40 95" stroke="#2dd4bf" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M70 105 Q85 100 100 105" stroke="#2dd4bf" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
