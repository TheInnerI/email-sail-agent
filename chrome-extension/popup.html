<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sail Agent</title>
    <style>
        :root {
            --navy: #1a2744;
            --teal: #2dd4bf;
            --gold: #f59e0b;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 380px;
            min-height: 500px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .header {
            background: var(--navy);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 16px; color: var(--teal); }
        .header span { font-size: 24px; }
        .content { padding: 16px; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .card-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .stat-value { font-weight: 600; color: var(--teal); }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
            margin-bottom: 8px;
        }
        .btn-primary { background: var(--teal); color: var(--navy); }
        .btn-primary:hover { background: #14b8a6; }
        .btn-secondary { background: var(--navy); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-connected { background: #22c55e; }
        .status-disconnected { background: #ef4444; }
        .status-pending { background: var(--gold); }
        .url-input {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            margin-bottom: 10px;
        }
        .url-input:focus { outline: none; border-color: var(--teal); }
        .footer { padding: 12px 16px; text-align: center; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="header">
        <span>⛵</span>
        <h1>Email Sail Agent</h1>
    </div>

    <div class="content">
        <!-- Connection Status -->
        <div class="card">
            <div class="card-title">Connection</div>
            <div id="connection-status">
                <span class="status-dot status-disconnected"></span>
                <span id="status-text">Not connected</span>
            </div>
            <input type="url" class="url-input" id="server-url" placeholder="Server URL (e.g., http://localhost:8090)">
            <button class="btn btn-primary" onclick="connect()">🔗 Connect</button>
        </div>

        <!-- Quick Stats -->
        <div class="card" id="stats-card" style="display: none;">
            <div class="card-title">Inbox Overview</div>
            <div class="stat-row">
                <span>Emails today</span>
                <span class="stat-value" id="stat-today">—</span>
            </div>
            <div class="stat-row">
                <span>Pending drafts</span>
                <span class="stat-value" id="stat-drafts">—</span>
            </div>
            <div class="stat-row">
                <span>Urgent</span>
                <span class="stat-value" style="color: #ef4444;" id="stat-urgent">—</span>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="card" id="actions-card" style="display: none;">
            <div class="card-title">Quick Actions</div>
            <button class="btn btn-primary" onclick="openDashboard()">📊 Open Dashboard</button>
            <button class="btn btn-secondary" onclick="classifyCurrent()">📧 Classify This Email</button>
            <button class="btn btn-secondary" onclick="draftResponse()">✍️ Draft Response</button>
        </div>

        <!-- Auth -->
        <div class="card" id="auth-card" style="display: none;">
            <div class="card-title">Gmail Authorization</div>
            <p style="font-size: 12px; color: var(--muted); margin-bottom: 10px;">
                Connect your Gmail to enable sorting, drafts, and booking.
            </p>
            <button class="btn btn-primary" onclick="authorizeGmail()">🔐 Connect Gmail</button>
        </div>
    </div>

    <div class="footer">
        Email Sail Agent v1.0.0 · innerinetcompany.com
    </div>

    <script src="popup.js"></script>
</body>
</html>
