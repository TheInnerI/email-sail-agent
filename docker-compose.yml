version: "3.8"

services:
  email-sail:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-sail-agent
    ports:
      - "8090:8090"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8090
      - APP_DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: email-sail-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      email-sail:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
